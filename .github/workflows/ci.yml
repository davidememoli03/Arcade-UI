# .github/workflows/ci.yml
name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: arcade-ui

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: arcade-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint:js

      - name: Stylelint
        run: npm run lint:css

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: arcade-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: arcade-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verifica dist/
        run: |
          test -f dist/arcade-ui.es.js   || (echo "❌ arcade-ui.es.js mancante"   && exit 1)
          test -f dist/arcade-ui.cjs.js  || (echo "❌ arcade-ui.cjs.js mancante"  && exit 1)
          test -f dist/arcade-ui.css     || (echo "❌ arcade-ui.css mancante"     && exit 1)
          test -f dist/arcade-ui.min.css || (echo "❌ arcade-ui.min.css mancante" && exit 1)
          test -f dist/arcade-ui.d.ts    || (echo "❌ arcade-ui.d.ts mancante"    && exit 1)
          test -f dist/arcade-ui-react.d.ts || (echo "❌ arcade-ui-react.d.ts mancante" && exit 1)
          test -f dist/arcade-ui-react.js || (echo "❌ arcade-ui-react.js mancante" && exit 1)
          test -f dist/arcade-ui-react.cjs || (echo "❌ arcade-ui-react.cjs mancante" && exit 1)
          test -f dist/angular/index.d.ts || (echo "❌ dist/angular/index.d.ts mancante" && exit 1)
          test -f dist/angular/fesm2022/davide03memoli-arcade-ui-angular.mjs || (echo "❌ Angular FESM mancante" && exit 1)
          echo "✅ tutti i file dist/ presenti"

      - name: Verifica exports + smoke consumer (DTS + React JSX + Angular types)
        run: npm run verify:consumers

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: arcade-ui/dist/

  release:
    name: Publish su npm
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: arcade-ui/package-lock.json
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verifica exports + smoke consumer (DTS + React JSX + Angular types)
        run: npm run verify:consumers

      - name: Verifica versione non già pubblicata
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "📦 Versione locale: $PKG_VERSION"
          PUBLISHED=$(npm view "$PKG_NAME@$PKG_VERSION" version 2>/dev/null || echo "")
          if [ "$PUBLISHED" = "$PKG_VERSION" ]; then
            echo "❌ La versione $PKG_VERSION è già pubblicata su npm. Bumpa la versione in package.json prima di fare merge su main."
            exit 1
          fi
          echo "✅ Versione $PKG_VERSION non ancora pubblicata, procedo."

      - name: Publish
        run: npm publish --access=public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
